<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Statement | Daily Returns</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { padding: 3rem 2rem; background-image: radial-gradient(circle at 50% 0%, #111827 0%, #030712 100%); }
        .statement-card { max-width: 1000px; margin: 0 auto; padding: 3rem; background: rgba(17, 24, 39, 0.7); border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); box-shadow: var(--shadow-glass); }
        .statement-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 2rem; margin-bottom: 2rem; }
        .statement-logo h2 { font-family: var(--font-heading); font-size: 2rem; font-weight: 800; color: #ffffff; background: linear-gradient(135deg, #ffffff 30%, var(--accent-cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .statement-title { text-align: right; }
        .statement-title h3 { font-family: var(--font-heading); color: var(--accent-cyan); font-size: 1.3rem; margin-bottom: 0.25rem; }
        .statement-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; margin-bottom: 2rem; }
        .filter-panel { display: flex; gap: 1rem; align-items: center; background: rgba(15,23,42,0.4); border: 1px solid rgba(255,255,255,0.04); padding: 1rem 1.5rem; border-radius: 10px; margin-bottom: 2rem; }
        @media print {
            body { background: #ffffff !important; color: #000000 !important; }
            .statement-card { border: none !important; box-shadow: none !important; background: transparent !important; color: #000000 !important; }
            .filter-panel, .btn-secondary { display: none !important; }
            td, th { color: #000000 !important; border-bottom: 1px solid #e2e8f0 !important; }
        }
    </style>
</head>
<body class="theme-obsidian">

    <div class="statement-card">
        
        <!-- HEADER -->
        <div class="statement-header">
            <div class="statement-logo">
                <h2><i class="fa-solid fa-wand-magic-sparkles"></i> JETRO AI REPORTING</h2>
                <p style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 0.25rem;">Live Copy-Trader Audit System</p>
            </div>
            <div class="statement-title">
                <h3>Daily Returns Statement</h3>
                <p style="color: var(--text-muted); font-size: 0.8rem;">Filter: <span id="report-range">All-Time</span></p>
            </div>
        </div>

        <!-- SUMMARY PANEL -->
        <div class="statement-grid">
            <div class="glass-panel" style="padding: 1.25rem; border-left: 4px solid var(--accent-emerald);">
                <span class="form-label" style="font-size: 0.65rem;">Total Realized Range Profit</span>
                <strong id="meta-profit" style="font-size: 1.3rem; font-family: var(--font-heading);">$0.00</strong>
            </div>
            <div class="glass-panel" style="padding: 1.25rem; border-left: 4px solid var(--accent-violet);">
                <span class="form-label" style="font-size: 0.65rem;">Total Active Trading Days</span>
                <strong id="meta-days" style="font-size: 1.3rem; font-family: var(--font-heading);">0 days</strong>
            </div>
        </div>

        <!-- ACTION BUTTONS PANEL -->
        <div class="filter-panel" style="justify-content: flex-end;">
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn-secondary" style="width: auto; padding: 0.5rem 1.2rem; font-size: 0.8rem;" onclick="window.print()"><i class="fa-solid fa-print"></i> Export Statement</button>
                <button class="btn-secondary" style="width: auto; padding: 0.5rem 1.2rem; font-size: 0.8rem;" onclick="window.close()"><i class="fa-solid fa-xmark"></i> Close</button>
            </div>
        </div>

        <!-- DAILY RETURNS BREAKDOWN -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Calendar Trading Date</th>
                        <th>Realized Profit/Loss (Daily P/L)</th>
                        <th>Range Cumulative Return</th>
                    </tr>
                </thead>
                <tbody id="daily-tbody">
                    <tr>
                        <td colspan="3" class="empty-state">
                            <i class="fa-solid fa-circle-notch fa-spin"></i>
                            <p>Loading daily trading stats ledger...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        async function loadDailyReport() {
            document.getElementById("report-range").textContent = "Lifetime Stats";
            
            try {
                let url = "/api/advanced-analytics";
                const response = await fetch(url);
                const data = await response.json();
                
                const tbody = document.getElementById("daily-tbody");
                
                if (data.success && data.daily_profit && data.daily_profit.length > 0) {
                    let html = '';
                    let cumProfit = 0;
                    
                    // Show latest first
                    const reversed = [...data.daily_profit].reverse();
                    
                    reversed.forEach(item => {
                        const profit = parseFloat(item.profit);
                        cumProfit += profit;
                        const profClass = profit >= 0 ? 'profit-positive' : 'profit-negative';
                        
                        html += `
                            <tr>
                                <td style="font-weight: 700;"><i class="fa-regular fa-calendar" style="margin-right: 0.3rem; color: var(--text-muted);"></i> ${item.date}</td>
                                <td><span class="profit-text ${profClass}">${profit >= 0 ? '+' : ''}$${profit.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</span></td>
                                <td><strong style="color: var(--accent-cyan);">$${cumProfit.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</strong></td>
                            </tr>
                        `;
                    });
                    
                    tbody.innerHTML = html;
                    document.getElementById("meta-days").textContent = `${data.daily_profit.length} Days`;
                    
                    const metaProf = document.getElementById("meta-profit");
                    metaProf.textContent = `${data.net_profit >= 0 ? '+' : ''}$${data.net_profit.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
                    metaProf.className = data.net_profit >= 0 ? 'profit-positive' : 'profit-negative';
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="3" class="empty-state">
                                <i class="fa-regular fa-calendar-times"></i>
                                <p>No completed daily statistics found within selected dates.</p>
                            </td>
                        </tr>
                    `;
                    document.getElementById("meta-profit").textContent = "$0.00";
                    document.getElementById("meta-days").textContent = "0 Days";
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        loadDailyReport();
    </script>
</body>
</html>
